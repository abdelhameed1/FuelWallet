services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fuelwallet_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "P@ssw0rd@123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      # 2022 images ship sqlcmd under mssql-tools18; -C trusts the self-signed cert.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api:
    build: .
    container_name: fuelwallet_api
    ports:
      - "5000:8080"
    environment:
      # Development enables Swagger UI and the dev-only reseed endpoint.
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FuelWalletDb;User Id=sa;Password=P@ssw0rd@123;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:
